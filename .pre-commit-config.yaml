repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: '\.(js|jsx|ts|tsx|json|md|yaml|yml)$'
        exclude: pnpm-lock.yaml

  - repo: local
    hooks:
      - id: secret-hygiene
        name: verify-secret-hygiene
        entry: ./scripts/verify-secret-hygiene.sh
        language: script
        pass_filenames: false
        always_run: true
